name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  # RC3 Windows coverage is intentionally limited to Git for Windows/Git Bash.
  # Native PowerShell hooks are not claimed or exercised by this matrix.
  CLAUDE_CODE_USE_POWERSHELL_TOOL: "0"

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check shell syntax
        run: |
          sh -n scripts/acgm-hook.sh
          sh -n scripts/build-release.sh
          sh -n bin/acgm

      - name: Run unit and fixture tests
        run: python -m unittest discover -s tests -v

      - name: Validate release contract
        run: python scripts/release_check.py

      - name: Verify committed manifest against the complete Git inventory
        run: python scripts/generate-package-manifest.py --check --source git
